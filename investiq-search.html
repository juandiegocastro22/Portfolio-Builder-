<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InvestIQ — Search</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0f14; --surface: #151820; --surface2: #1c2030;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
  --text: #eef0f8; --text2: #8891aa; --text3: #555f7a;
  --green: #22d48a; --green-dim: rgba(34,212,138,0.12);
  --red: #ff5f6e; --red-dim: rgba(255,95,110,0.12);
  --amber: #f5a623; --amber-dim: rgba(245,166,35,0.12);
  --accent: #6c7fff; --accent-dim: rgba(108,127,255,0.15);
  --font: 'DM Sans', sans-serif; --serif: 'DM Serif Display', serif;
}
html, body { background: var(--bg); color: var(--text); font-family: var(--font); -webkit-font-smoothing: antialiased; min-height: 100vh; }
.topbar { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; padding: 0 32px; height: 56px; background: rgba(13,15,20,0.9); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); gap: 16px; }
.logo { font-family: var(--serif); font-size: 20px; color: var(--text); display: flex; align-items: center; gap: 6px; text-decoration: none; flex-shrink: 0; }
.logo-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
.search-wrap { flex: 1; max-width: 600px; position: relative; }
.search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }
.search-input { width: 100%; padding: 10px 14px 10px 40px; background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; color: var(--text); font-family: var(--font); font-size: 14px; outline: none; transition: border-color 0.2s; }
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text3); }
.topbar-right { margin-left: auto; }
.btn-accent { font-family: var(--font); font-size: 13px; font-weight: 600; padding: 7px 16px; border-radius: 8px; border: none; background: var(--accent); color: #fff; cursor: pointer; text-decoration: none; display: inline-flex; }
.page { max-width: 1000px; margin: 0 auto; padding: 28px 24px; }
.trending { margin-bottom: 28px; }
.trending-label { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
.trending-chips { display: flex; gap: 8px; flex-wrap: wrap; }
.trending-chip { display: flex; align-items: center; gap: 6px; padding: 6px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; font-size: 13px; color: var(--text2); cursor: pointer; transition: all 0.15s; text-decoration: none; }
.trending-chip:hover { border-color: var(--accent); color: var(--accent); }
.chg { font-size: 11px; font-weight: 600; }
.chg.up { color: var(--green); }
.chg.dn { color: var(--red); }
.results-label { font-size: 13px; color: var(--text2); margin-bottom: 14px; }
.results-label strong { color: var(--text); }
.table-header { display: grid; grid-template-columns: 2fr 1fr 1fr 0.8fr; padding: 0 20px 10px; gap: 12px; font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; }
.table-header span { text-align: right; }
.table-header span:first-child { text-align: left; }
.result-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; margin-bottom: 10px; cursor: pointer; transition: all 0.15s; display: grid; grid-template-columns: 2fr 1fr 1fr 0.8fr; align-items: center; gap: 12px; text-decoration: none; }
.result-card:hover { border-color: var(--border2); background: var(--surface2); transform: translateX(2px); }
.result-asset { display: flex; align-items: center; gap: 12px; }
.result-logo { width: 38px; height: 38px; border-radius: 10px; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--text3); flex-shrink: 0; }
.result-ticker { font-size: 14px; font-weight: 700; color: var(--text); }
.result-name { font-size: 12px; color: var(--text3); margin-top: 1px; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.result-type { font-size: 10px; background: var(--surface2); color: var(--text3); padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border); display: inline-block; margin-top: 3px; }
.result-price { font-size: 14px; font-weight: 600; color: var(--text); text-align: right; }
.result-change { font-size: 13px; font-weight: 600; text-align: right; }
.result-change.up { color: var(--green); }
.result-change.dn { color: var(--red); }
.result-signal { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px; display: inline-block; }
.result-signal.buy { background: var(--green-dim); color: var(--green); }
.result-signal.hold { background: var(--amber-dim); color: var(--amber); }
.result-signal.sell { background: var(--red-dim); color: var(--red); }
.empty { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 14px; }
.loading { text-align: center; padding: 40px; color: var(--text3); font-size: 13px; }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 8px; }
@media (max-width: 700px) {
  .result-card, .table-header { grid-template-columns: 1fr 1fr; }
  .result-card > *:nth-child(n+3), .table-header span:nth-child(n+3) { display: none; }
}
</style>
</head>
<body>
<header class="topbar">
  <a class="logo" href="index.html"><span class="logo-dot"></span>InvestIQ</a>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input class="search-input" id="searchInput" type="text" placeholder="Search any stock, ETF, crypto... e.g. Apple, TSLA, Bitcoin">
  </div>
  <div class="topbar-right"><a class="btn-accent" href="investiq-auth.html">Sign in</a></div>
</header>

<div class="page">
  <div class="trending">
    <div class="trending-label">🔥 Trending today</div>
    <div class="trending-chips">
      <a class="trending-chip" href="investiq-stock.html?symbol=NVDA">NVDA <span class="chg" id="chg-NVDA">—</span></a>
      <a class="trending-chip" href="investiq-stock.html?symbol=TSLA">TSLA <span class="chg" id="chg-TSLA">—</span></a>
      <a class="trending-chip" href="investiq-stock.html?symbol=AAPL">AAPL <span class="chg" id="chg-AAPL">—</span></a>
      <a class="trending-chip" href="investiq-stock.html?symbol=META">META <span class="chg" id="chg-META">—</span></a>
      <a class="trending-chip" href="investiq-stock.html?symbol=SPY">SPY <span class="chg" id="chg-SPY">—</span></a>
    </div>
  </div>

  <div class="results-label" id="resultsLabel">Search for any stock, ETF, or crypto to get started.</div>
  <div class="table-header" id="tableHeader" style="display:none;">
    <span>Asset</span><span>Price</span><span>24h Change</span><span>Signal</span>
  </div>
  <div id="resultsContainer"></div>
</div>

<script>
const API = 'd74p7thr01qg1eo6cjggd74p7thr01qg1eo6cjh0';
const q = s => fetch(`https://finnhub.io/api/v1${s}&token=${API}`).then(r=>r.json());
const clean = s => s.replace(/[^a-zA-Z0-9]/g,'');

['NVDA','TSLA','AAPL','META','SPY'].forEach(async sym => {
  try {
    const d = await q(`/quote?symbol=${sym}`);
    const el = document.getElementById(`chg-${sym}`);
    if (el && d.dp != null) { const up=d.dp>=0; el.textContent=`${up?'+':''}${d.dp.toFixed(2)}%`; el.className=`chg ${up?'up':'dn'}`; }
  } catch(e){}
});

const urlQ = new URLSearchParams(window.location.search).get('q');
if (urlQ) { document.getElementById('searchInput').value=urlQ; doSearch(urlQ); }

let timer;
document.getElementById('searchInput').addEventListener('input', function() {
  clearTimeout(timer);
  const v = this.value.trim();
  if (!v) { document.getElementById('resultsContainer').innerHTML=''; document.getElementById('tableHeader').style.display='none'; document.getElementById('resultsLabel').textContent='Search for any stock, ETF, or crypto to get started.'; return; }
  timer = setTimeout(()=>doSearch(v), 450);
});
document.getElementById('searchInput').addEventListener('keydown', e => { if(e.key==='Enter'){clearTimeout(timer);doSearch(e.target.value.trim());} });

async function doSearch(query) {
  if (!query) return;
  document.getElementById('tableHeader').style.display='none';
  document.getElementById('resultsLabel').textContent=`Searching...`;
  document.getElementById('resultsContainer').innerHTML='<div class="loading"><div class="spinner"></div><br>Finding results...</div>';
  try {
    const data = await q(`/search?q=${encodeURIComponent(query)}`);
    const results = (data.result||[]).filter(r=>r.symbol&&r.description).slice(0,10);
    if (!results.length) { document.getElementById('resultsContainer').innerHTML=`<div class="empty">No results for "${query}".<br>Try a ticker like AAPL, or a company name like Apple.</div>`; document.getElementById('resultsLabel').textContent=`No results for "${query}"`; return; }
    document.getElementById('resultsLabel').innerHTML=`Showing <strong>${results.length} results</strong> for "${query}"`;
    document.getElementById('tableHeader').style.display='grid';
    document.getElementById('resultsContainer').innerHTML=results.map(r=>`
      <a class="result-card" href="investiq-stock.html?symbol=${encodeURIComponent(r.symbol)}" id="row-${clean(r.symbol)}">
        <div class="result-asset">
          <div class="result-logo">${r.symbol.slice(0,4)}</div>
          <div><div class="result-ticker">${r.symbol}</div><div class="result-name">${r.description}</div><span class="result-type">${r.type||'Stock'}</span></div>
        </div>
        <div class="result-price" id="p-${clean(r.symbol)}">—</div>
        <div class="result-change" id="c-${clean(r.symbol)}">—</div>
        <div style="text-align:right"><span class="result-signal" id="s-${clean(r.symbol)}">—</span></div>
      </a>
    `).join('');
    results.forEach(async res => {
      try {
        const d = await q(`/quote?symbol=${res.symbol}`);
        const id = clean(res.symbol);
        const pe=document.getElementById(`p-${id}`), ce=document.getElementById(`c-${id}`), se=document.getElementById(`s-${id}`);
        if (!pe||!d.c) return;
        pe.textContent='$'+d.c.toFixed(2);
        const up=d.d>=0;
        ce.textContent=`${up?'▲':'▼'} ${up?'+':''}${d.dp?.toFixed(2)}%`;
        ce.className=`result-change ${up?'up':'dn'}`;
        const sig=d.dp>1?'buy':d.dp<-1?'sell':'hold';
        se.textContent=d.dp>1?'BUY':d.dp<-1?'REDUCE':'HOLD';
        se.className=`result-signal ${sig}`;
      } catch(e){}
    });
  } catch(e) {
    document.getElementById('resultsContainer').innerHTML='<div class="empty">Something went wrong. Please try again.</div>';
  }
}
</script>
</body>
</html>
